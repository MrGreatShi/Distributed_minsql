# Default distributed MiniSQL settings derived from README.md
minisql.master.host=127.0.0.1
minisql.zookeeper.registry-path=/db
minisql.zookeeper.connect-string=127.0.0.1:2181
minisql.zookeeper.session-timeout-millis=60000
minisql.zookeeper.connection-timeout-millis=15000
minisql.master.port=12345
minisql.region.client-port=22222
minisql.region.migration-port=1117
minisql.socket.timeout-millis=15000

